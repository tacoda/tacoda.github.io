  # primaryColor = "#8caee0"
  # primaryColor = "#9993dc"
  # darkestColor = "#d35050"
  # lightColor = "#f5e3e0"
  # lightestColor = "#f5f5f5"

  [params.assets]
  favicon = "favicon.ico"

  [params.label]
  text = "Ian Johnson"
  icon = "/apple-touch-icon.png"
  iconHeight = 35

  [[params.social]]
  icon = "github"
  name = "github"
  url = "https://github.com/tacoda"

  [[params.social]]
  icon = "linkedin"
  name = "linkedin"
  url = "https://www.linkedin.com/in/tacoda/"

  [[params.social]]
  icon = "rss"
  name = "rss"
  url = "/posts/index.xml"

  [[params.social]]
  icon = "mail"
  name = "email"
  url = "mailto:tacoda@hey.com"

