baseURL = "https://www.tacoda.dev/"
title = "Ian Johnson"
paginate = 5
theme = "m10c"
enableRobotsTXT = false
buildDrafts = false
buildFuture = false
buildExpired = false
# googleAnalytics = "UA-123-45"
pygmentsUseClasses = true

[minify]
disableXML = true
minifyOutput = true

[params]
env = "production"
title = "Ian Johnson"
description = "Software Engineer"
keywords = [ "Blog", "Portfolio" ]
author = "Ian Johnson"
avatar = "http://gravatar.com/avatar/0a09dcb201b488dece3b9e47e3f2443b"
menu_item_separator = "|"
images = [ "http://gravatar.com/avatar/0a09dcb201b488dece3b9e47e3f2443b" ]
DateFormat = "January 2, 2006"
defaultTheme = "auto"
disableThemeToggle = false
ShowReadingTime = true
ShowShareButtons = false
ShowPostNavLinks = true
ShowBreadCrumbs = true
ShowCodeCopyButtons = false
ShowWordCount = true
ShowRssButtonInSectionTermList = true
UseHugoToc = true
disableSpecial1stPost = false
disableScrollToTop = false
comments = false
hidemeta = false
hideFooter = true
hideSummary = false
showtoc = false
tocopen = false

  [params.style]
  primaryColor = "#57cc8a"
  darkColor = "#3f4c54"
